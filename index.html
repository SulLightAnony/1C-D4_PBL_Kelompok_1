<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Kelompok 1 - PBL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Efek partikel bintang */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(100,255,218,0.1) 0%, transparent 40%),
                        radial-gradient(circle at 40% 80%, rgba(255,100,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 800px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #ffffff;
            font-size: clamp(1.8rem, 5vw, 3rem);
            text-align: center;
            margin-bottom: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 
                0 0 10px rgba(100,255,218,0.5),
                0 0 20px rgba(100,255,218,0.3),
                0 0 30px rgba(100,255,218,0.2);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(100,255,218,0.5), 0 0 20px rgba(100,255,218,0.3), 0 0 30px rgba(100,255,218,0.2); }
            50% { text-shadow: 0 0 15px rgba(100,255,218,0.8), 0 0 30px rgba(100,255,218,0.5), 0 0 45px rgba(100,255,218,0.3); }
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            width: 100%;
        }

        .project-item {
            list-style: none;
            width: 100%;
            max-width: 500px;
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .project-item:nth-child(1) { animation-delay: 0.2s; }
        .project-item:nth-child(2) { animation-delay: 0.4s; }
        .project-item:nth-child(3) { animation-delay: 0.6s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .neon-button {
            display: inline-block;
            width: 100%;
            padding: 1.2rem 2rem;
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(5px);
            border: 2px solid #64ffda;
            border-radius: 50px;
            color: #64ffda;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 10px rgba(100,255,218,0.3),
                inset 0 0 10px rgba(100,255,218,0.1);
            position: relative;
            overflow: hidden;
        }

        .neon-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .neon-button:hover {
            transform: scale(1.08);
            background: rgba(100, 255, 218, 0.1);
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 
                0 0 20px rgba(255,255,255,0.5),
                0 0 40px rgba(255,255,255,0.3),
                0 0 60px rgba(255,255,255,0.2),
                inset 0 0 20px rgba(255,255,255,0.3);
        }

        .neon-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .neon-button:active {
            transform: scale(1.02);
        }

        .footer {
            margin-top: 4rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            text-align: center;
            animation: fadeIn 1s ease-out 1s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Efek garis neon di samping */
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, #64ffda, transparent);
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            animation: neonLine 3s ease-in-out infinite;
        }

        .container::after {
            left: auto;
            right: -20px;
            animation-delay: 1.5s;
        }

        @keyframes neonLine {
            0%, 100% { opacity: 0.3; height: 100px; }
            50% { opacity: 1; height: 150px; }
        }

        /* Responsive design */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            h1 { font-size: 1.5rem; letter-spacing: 2px; }
            .neon-button { padding: 1rem 1.5rem; font-size: 1rem; }
            .container::before, .container::after { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Tugas Kelompok 1 ✨</h1>
        <h2 style="text-align: center; color: #a8b2d1; font-weight: 300; margin-bottom: 2rem; font-size: 1.2rem; letter-spacing: 2px; text-shadow: 0 0 8px rgba(168,178,209,0.3);">
            Pilih Website untuk Diakses
        </h2>
        
        <ul class="project-list">
            <li class="project-item">
                <a href="https://sullightanony.github.io/1C-D4_PBL_Kelompok_1/Tugas_01_LandingPage/" class="neon-button" target="_blank" rel="noopener noreferrer">
                    🚀 Landing Page
                </a>
            </li>
            <!-- Tambahkan project lain di sini -->
            <li class="project-item">
                <a href="#" class="neon-button" style="border-color: #ff64b4; color: #ff64b4; box-shadow: 0 0 10px rgba(255,100,180,0.3);" 
                   onmouseover="this.style.boxShadow='0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(255,255,255,0.3)'; this.style.borderColor='#ffffff'; this.style.color='#ffffff'"
                   onmouseout="this.style.boxShadow='0 0 10px rgba(255,100,180,0.3)'; this.style.borderColor='#ff64b4'; this.style.color='#ff64b4'">
                    💻 Project 2 (Coming Soon)
                </a>
            </li>
        </ul>

        <div class="footer">
            <p>© 2024 Kelompok 1 - PBL D4 | Dengan 💙 dan efek neon</p>
        </div>
    </div>
</body>
</html>
